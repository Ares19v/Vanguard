version: "3.9"

services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vanguard-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - vanguard-db:/app/data   # persist SQLite between restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── React Frontend (nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vanguard-frontend
    ports:
      - "5173:80"             # nginx serves on 80 internally; expose as 5173
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  vanguard-db:
    name: vanguard-db
